syntax = "proto3";

package cards;

option go_package = "backend_nonsense/pb";

service MTGRPC {
    rpc GetCard(GetCardRequest)             returns (GetCardResponse){}
    rpc SearchCards(SearchCardsRequest)     returns (SearchCardsResponse){}
    rpc ListCards(ListCardsRequest)         returns (ListCardsResponse){}
    rpc ListSets(ListSetsRequest)           returns(ListSetsResponse){}
    rpc GetSetInfo(GetSetInfoRequest)       returns(GetSetInfoResponse){}
}

//Prices message
message Prices {
    string usd = 1;
    string usd_foil = 2;
    string eur = 3;
    string eur_foil = 4;
    string tix = 5;
}
// Shared card message
message Card {
    string name      = 1;
    string set       = 2;
    string number    = 3;
    int32  count     = 4;
    string image_url = 5;
    Prices prices  = 6;
    repeated string colors = 7;
    string rarity = 8;
}
message SetCompletion {
	string image_uri = 1;
	string set = 2;
	int32 owned = 3;
	int32 total = 4;
}
message GetSetInfoRequest{}
message GetSetInfoResponse{
    repeated SetCompletion sets = 1;
}
// GetCard — exact lookup by name + set + number
message GetCardRequest {
    string name   = 1;
    string set    = 2;
    string number = 3;
}

message GetCardResponse {
    Card card = 1;
}

// SearchCards — flexible filter, all fields optional
message SearchCardsRequest {
    string          name       = 1;
    string          set        = 2;
    repeated string colors     = 3; // e.g. ["W", "U", "B", "R", "G"]
    int32           page_size  = 4;
    string          page_token = 5;
    repeated string rarity     = 6;
}

message SearchCardsResponse {
    repeated Card cards          = 1;
    string        next_page_token = 2;
}

// ListCards — full collection with optional pagination
message ListCardsRequest {
    int32  page_size  = 1;
    string page_token = 2;
}

message ListCardsResponse {
    repeated Card cards          = 1;
    string        next_page_token = 2;
}

message ListSetsRequest {}
message ListSetsResponse {
    repeated string sets = 1;
}
